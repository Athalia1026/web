<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validasi Password</title>
    <link rel="stylesheet" href="assests/css/stylesheet.css" />
  </head>

  <body>
    <form id="registrationForm">
      <h2>Formulir Pendaftaran</h2>

      <div class="form-group">
        <label for="Name">Nama Lengkap</label>
        <span class="separator">:</span>
        <input type="text" id="nama" name="nama" required />
      </div>

      <div class="form-group">
        <label for="Address">Alamat</label>
        <span class="separator">:</span>
        <input type="text" id="alamat" name="alamat" required />
      </div>

      <div class="form-group">
        <label for="Tempat Lahir">Tempat Lahir</label>
        <span class="separator">:</span>
        <input type="text" id="tptlahir" name="tptlahir" required />
      </div>

      <div class="form-group">
        <label for="Tanggal Lahir">Tanggal Lahir</label>
        <span class="separator">:</span>
        <input type="date" id="tgllahir" name="tgllahir" required />
      </div>

      <div class="form-group">
        <label> Jenis Kelamin</label>
        <span class="separator">:</span>
        <div class="radio-group">
          <input type="radio" name="jk" value="Laki-laki" required />Lelaki
          <input type="radio" name="jk" value="Perempuan" required />Perempuan
        </div>
      </div>

      <input type="submit" value="Daftar" />
    </form>

    <script>
      function validasiNama() {
        let inputNama = document.getElementById("nama").value;
        let pola = /^[a-zA-Z' ]+$/;

        if (!pola.test(inputNama)) {
          alert("Nama hanya boleh mengandung huruf dan tanda petik satu (')");
          return false;
        }
        alert("Nama valid!");
        return true;
      }

      document
        .getElementById("registrationForm")
        .addEventListener("submit", function (event) {
          if (!validasiNama()) {
            event.preventDefault();
          }
        });
    </script>
  </body>
</html>
